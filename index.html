<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATデザイン｜販売プレゼン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app loading">
    <header class="topbar" data-presenter-only>
      <div>
        <strong>ATデザイン｜販売プレゼン</strong>
        <span>Presenter</span>
      </div>
      <div class="actions">
        <button id="openAudience">顧客表示を開く</button>
        <button id="fullscreen">全画面</button>
      </div>
    </header>

    <main class="stageWrap">
      <section class="slideStage" aria-label="slide viewer">
        <div id="counter" class="counter"></div>
      </section>

      <aside class="scriptPanel" data-presenter-only>
        <div class="scriptHeader">
          <div>
            <small>台本</small>
            <h1 id="scriptTitle"></h1>
          </div>
          <div class="navButtons">
            <button id="prev">←</button>
            <button id="next">→</button>
          </div>
        </div>
        <div class="scriptBlock first"><h2>一言目</h2><p id="first"></p></div>
        <div class="scriptBlock"><h2>補足説明</h2><p id="talk"></p></div>
        <div class="scriptBlock point"><h2>押さえるポイント</h2><p id="point"></p></div>
        <div class="scriptBlock ask"><h2>相手に投げる質問</h2><p id="ask"></p></div>
        <div id="thumbs" class="thumbs"></div>
      </aside>
    </main>
  </div>

  <script src="slides.js"></script>
  <script src="app.js"></script>
</body>
</html>
